# Manual publish via the Actions UI. Default is dry-run; set `dry_run: false`
# to actually publish. Requires NPM_TOKEN secret + npm trusted-publisher config.

name: cd

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no publish)"
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write # required for npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup pnpm
        uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2 # v4.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Build
        run: pnpm -r build

      - name: Test
        run: pnpm -r test

      - name: Verify npm package signatures
        run: npm audit signatures

      - name: Pre-publish clean (drop coverage / dist-test from tarball roots)
        run: pnpm -r clean || true

      - name: Generate SBOM (CycloneDX)
        run: |
          mkdir -p sbom
          pnpm dlx @cyclonedx/cdxgen@^11 -o sbom/databehave.cdx.json -t pnpm --spec-version 1.5

      - name: Upload SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-cyclonedx
          path: sbom/

      - name: Publish to npm (with provenance)
        if: ${{ inputs.dry_run == false }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm -r publish --provenance --access public --no-git-checks
